services:
  db:
    image: postgis/postgis:16-3.4
    # pgvector must be installed inside the container:
    #   docker exec okeanus-db-1 apt-get update && apt-get install -y postgresql-16-pgvector
    environment:
      POSTGRES_DB: okeanus
      POSTGRES_USER: okeanus
      POSTGRES_PASSWORD: okeanus
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redisdata:/data

  app:
    build: .
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://okeanus:okeanus@db:5432/okeanus
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./src:/app/src
    command: uvicorn okeanus.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
  redisdata:
