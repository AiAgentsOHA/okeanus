services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: okeanus
      POSTGRES_USER: okeanus
      POSTGRES_PASSWORD: okeanus
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - db
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://okeanus:okeanus@db:5432/okeanus
    volumes:
      - ./src:/app/src
    command: uvicorn okeanus.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
